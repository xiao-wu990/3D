<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P2P 文件传输 - GitHub Pages 版本</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 800px;
      width: 100%;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .header p {
      opacity: 0.9;
      font-size: 14px;
    }

    .content {
      padding: 30px;
    }

    .mode-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }

    .mode-btn {
      padding: 40px 20px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      background: white;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
    }

    .mode-btn:hover {
      border-color: #667eea;
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.2);
    }

    .mode-btn.active {
      border-color: #667eea;
      background: #f0f3ff;
    }

    .mode-btn .icon {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .mode-btn h3 {
      font-size: 18px;
      margin-bottom: 8px;
      color: #333;
    }

    .mode-btn p {
      font-size: 14px;
      color: #666;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }

    .input-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    .input-group input:focus {
      outline: none;
      border-color: #667eea;
    }

    .btn {
      padding: 12px 30px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-block;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .connection-info {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }

    .connection-info.show {
      display: block;
    }

    .connection-info h4 {
      color: #667eea;
      margin-bottom: 15px;
    }

    .info-item {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      padding: 10px;
      background: white;
      border-radius: 6px;
    }

    .info-item label {
      font-weight: 600;
      margin-right: 10px;
      min-width: 80px;
    }

    .info-item .value {
      flex: 1;
      font-family: monospace;
      color: #667eea;
      word-break: break-all;
    }

    .info-item .copy-btn {
      padding: 5px 10px;
      font-size: 12px;
      margin-left: 10px;
    }

    .file-area {
      border: 2px dashed #e0e0e0;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      margin-bottom: 20px;
      transition: all 0.3s;
      cursor: pointer;
    }

    .file-area:hover {
      border-color: #667eea;
      background: #f0f3ff;
    }

    .file-area.dragover {
      border-color: #667eea;
      background: #f0f3ff;
    }

    .file-area .icon {
      font-size: 64px;
      margin-bottom: 15px;
    }

    .file-area h3 {
      margin-bottom: 10px;
      color: #333;
    }

    .file-area p {
      color: #666;
    }

    .status {
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }

    .status.show {
      display: block;
    }

    .status.connecting {
      background: #fff3cd;
      color: #856404;
    }

    .status.connected {
      background: #d4edda;
      color: #155724;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
    }

    .file-list {
      margin-top: 20px;
    }

    .file-item {
      display: flex;
      align-items: center;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .file-item .icon {
      font-size: 32px;
      margin-right: 15px;
    }

    .file-item .info {
      flex: 1;
    }

    .file-item .info .name {
      font-weight: 600;
      margin-bottom: 5px;
    }

    .file-item .info .size {
      font-size: 12px;
      color: #666;
    }

    .file-item .download-btn {
      padding: 8px 15px;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      .mode-selector {
        grid-template-columns: 1fr;
      }

      .info-item {
        flex-direction: column;
        align-items: flex-start;
      }

      .info-item .copy-btn {
        margin-left: 0;
        margin-top: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📡 P2P 文件传输</h1>
      <p>基于 WebRTC 的点对点文件传输，无需服务器，完全免费</p>
    </div>

    <div class="content">
      <!-- 模式选择 -->
      <div class="mode-selector" id="mode-selector">
        <div class="mode-btn" onclick="selectMode('sender')" id="sender-btn">
          <div class="icon">📤</div>
          <h3>发送端</h3>
          <p>发送文件到对方</p>
        </div>
        <div class="mode-btn" onclick="selectMode('receiver')" id="receiver-btn">
          <div class="icon">📥</div>
          <h3>接收端</h3>
          <p>接收文件</p>
        </div>
      </div>

      <!-- 连接信息 -->
      <div class="connection-info" id="connection-info">
        <h4>🔗 连接信息</h4>
        <div class="info-item">
          <label>你的 ID:</label>
          <input type="text" class="value" id="local-id" readonly>
          <button class="btn btn-secondary copy-btn" onclick="copyToClipboard('local-id')">复制</button>
        </div>
        <div class="input-group" style="margin-top: 15px;">
          <label>对方 ID:</label>
          <input type="text" id="remote-id" placeholder="粘贴对方的 ID">
        </div>
        <button class="btn btn-primary" onclick="connect()">连接</button>
      </div>

      <!-- 状态 -->
      <div class="status" id="status"></div>

      <!-- 文件上传区域 -->
      <div class="file-area" id="file-area" onclick="document.getElementById('file-input').click()" style="display: none;">
        <div class="icon">📁</div>
        <h3>拖拽文件到这里</h3>
        <p>或点击选择文件</p>
        <input type="file" id="file-input" multiple style="display: none;">
      </div>

      <!-- 文件列表 -->
      <div class="file-list" id="file-list"></div>
    </div>
  </div>

  <script src="simplepeer.min.js"></script>
  <script>
    let localPeer = null;
    let conn = null;
    let mode = null;
    const peers = {};

    // 选择模式
    function selectMode(selectedMode) {
      mode = selectedMode;
      
      document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(selectedMode + '-btn').classList.add('active');
      
      document.getElementById('connection-info').classList.add('show');
      
      if (selectedMode === 'sender') {
        document.getElementById('file-area').style.display = 'block';
      }
      
      initPeer();
    }

    // 初始化 Peer
    function initPeer() {
      const id = Math.random().toString(36).substr(2, 9);
      document.getElementById('local-id').value = id;
      
      localPeer = new SimplePeer({
        initiator: mode === 'sender',
        trickle: true,
        config: {
          iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:global.stun.twilio.com:3478' }
          ]
        }
      });

      localPeer.on('signal', data => {
        // 这里需要通过其他方式交换 signal 数据
        // 实际使用时可以通过 WebSocket 服务器中转
        console.log('Signal:', data);
      });

      localPeer.on('connect', () => {
        showStatus('✅ 连接成功！', 'connected');
        console.log('Connected to peer');
      });

      localPeer.on('data', data => {
        console.log('Received data:', data);
        
        if (data.type === 'file') {
          handleFile(data);
        }
      });

      localPeer.on('error', err => {
        showStatus('❌ 连接错误: ' + err.message, 'error');
        console.error('Peer error:', err);
      });
    }

    // 连接到对方
    function connect() {
      const remoteId = document.getElementById('remote-id').value;
      
      if (!remoteId) {
        alert('请输入对方 ID');
        return;
      }
      
      showStatus('⏳ 正在连接...', 'connecting');
      
      // 注意：这是一个简化版本
      // 实际 P2P 连接需要 WebSocket 服务器中转 signal 数据
      // 这里只是演示概念
      
      setTimeout(() => {
        showStatus('⚠️ 此版本需要 WebSocket 服务器中转信号，GitHub Pages 无法提供', 'error');
      }, 1000);
    }

    // 发送文件
    function sendFile(file) {
      if (!conn) {
        alert('请先建立连接');
        return;
      }

      const reader = new FileReader();
      reader.onload = function(e) {
        const fileData = {
          type: 'file',
          name: file.name,
          size: file.size,
          data: e.target.result
        };
        
        conn.send(fileData);
        
        addFileToList({
          name: file.name,
          size: file.size,
          sent: true
        });
      };
      
      reader.readAsDataURL(file);
    }

    // 处理接收的文件
    function handleFile(fileData) {
      const file = {
        name: fileData.name,
        size: fileData.size,
        data: fileData.data,
        received: true
      };
      
      addFileToList(file);
      alert('收到文件: ' + fileData.name);
    }

    // 添加到文件列表
    function addFileToList(file) {
      const list = document.getElementById('file-list');
      const item = document.createElement('div');
      item.className = 'file-item';
      
      const icon = getFileIcon(file.name);
      const size = formatSize(file.size);
      
      item.innerHTML = `
        <div class="icon">${icon}</div>
        <div class="info">
          <div class="name">${file.name}</div>
          <div class="size">${size}</div>
        </div>
        ${file.received ? `<button class="btn btn-secondary download-btn" onclick="downloadFile('${file.name}', '${file.data}')">下载</button>` : '<span style="color: #28a745;">已发送</span>'}
      `;
      
      list.appendChild(item);
    }

    // 下载文件
    function downloadFile(name, data) {
      const link = document.createElement('a');
      link.href = data;
      link.download = name;
      link.click();
    }

    // 获取文件图标
    function getFileIcon(fileName) {
      const ext = fileName.split('.').pop().toLowerCase();
      const icons = {
        'pdf': '📄',
        'doc': '📝', 'docx': '📝',
        'xls': '📊', 'xlsx': '📊',
        'jpg': '🖼️', 'jpeg': '🖼️', 'png': '🖼️', 'gif': '🖼️',
        'mp4': '🎬', 'avi': '🎬',
        'mp3': '🎵', 'wav': '🎵',
        'zip': '📦', 'rar': '📦',
        'txt': '📃'
      };
      return icons[ext] || '📄';
    }

    // 格式化大小
    function formatSize(bytes) {
      if (bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    // 复制到剪贴板
    function copyToClipboard(elementId) {
      const el = document.getElementById(elementId);
      el.select();
      document.execCommand('copy');
      alert('已复制！');
    }

    // 显示状态
    function showStatus(message, type) {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = 'status show ' + type;
    }

    // 文件选择
    document.getElementById('file-input').addEventListener('change', function(e) {
      const files = Array.from(e.target.files);
      files.forEach(file => sendFile(file));
    });

    // 拖拽上传
    const fileArea = document.getElementById('file-area');
    
    fileArea.addEventListener('dragover', function(e) {
      e.preventDefault();
      fileArea.classList.add('dragover');
    });

    fileArea.addEventListener('dragleave', function(e) {
      e.preventDefault();
      fileArea.classList.remove('dragover');
    });

    fileArea.addEventListener('drop', function(e) {
      e.preventDefault();
      fileArea.classList.remove('dragover');
      const files = Array.from(e.dataTransfer.files);
      files.forEach(file => sendFile(file));
    });
  </script>
</body>
</html>
